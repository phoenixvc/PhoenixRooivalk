name: "Phoenix Rooivalk CodeQL Configuration"

# Use default queries plus the security-and-quality suite.
# security-extended is removed — it overlaps heavily with security-and-quality
# and doubles query evaluation time with minimal additional coverage.
disable-default-queries: false

queries:
  - uses: security-and-quality

paths-ignore:
  - "**/node_modules/**"
  - "**/target/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/.next/**"
  - "**/out/**"
  - "**/coverage/**"
  - "docs/**"
  - "**/apps/docs/build/**"
  - "**/apps/marketing/out/**"
  # Tauri/Leptos desktop app — massive WASM dep tree, minimal security surface
  - "apps/threat-simulator-desktop/**"

paths:
  - "apps/marketing/src/**"
  - "apps/docs/src/**"
  - "apps/api/src/**"
  - "apps/keeper/src/**"
  - "apps/evidence-cli/src/**"
  - "crates/**"
  - "packages/**"
