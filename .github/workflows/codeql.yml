name: "CodeQL Security Analysis"

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.rs"
      - ".github/workflows/codeql.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.rs"
      - ".github/workflows/codeql.yml"
  schedule:
    - cron: "30 2 * * 1" # Weekly on Monday at 2:30 AM UTC
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: rust
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check if CodeQL is enabled
        id: codeql-check
        continue-on-error: true
        run: |
          # Check if code scanning is enabled
          if [ -z "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "::warning::GitHub token not available. Code scanning might not work properly."
            echo "enabled=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Try to verify if code scanning is enabled
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/analyses" || true)

          if [[ "$RESPONSE" == *"code scanning is not enabled"* ]]; then
            echo "::warning::Code scanning is not enabled for this repository."
            echo "::warning::Please enable it in repository Settings > Security > Code scanning."
            echo "enabled=false" >> $GITHUB_OUTPUT
          else
            echo "Code scanning appears to be enabled."
            echo "enabled=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Rust toolchain
        if:
          ${{ steps.codeql-check.outputs.enabled == 'true' && matrix.language ==
          'rust' }}
        uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        if:
          ${{ steps.codeql-check.outputs.enabled == 'true' && matrix.language ==
          'rust' }}
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          shared-key: codeql-rust

      - name: Setup pnpm
        if: matrix.language == 'javascript-typescript'
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Generate lockfile if missing
        if: matrix.language == 'javascript-typescript'
        run: |
          if [ ! -f pnpm-lock.yaml ]; then
            echo "pnpm-lock.yaml not found, generating..."
            pnpm install --no-frozen-lockfile
          fi

      - name: Setup Node.js
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install dependencies
        if: matrix.language == 'javascript-typescript'
        run: |
          cd packages/ui
          pnpm install --frozen-lockfile

      - name: Initialize CodeQL
        if: steps.codeql-check.outputs.enabled == 'true'
        uses: github/codeql-action/init@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: .github/codeql-config.yml

      - name: Perform CodeQL Analysis
        if: steps.codeql-check.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          category: "/language:${{matrix.language}}"
          upload: false
          output: codeql-results.sarif

      - name: Upload SARIF results (non-fatal)
        if: steps.codeql-check.outputs.enabled == 'true'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          sarif_file: codeql-results.sarif
          checkout_path: ${{ github.workspace }}
          category: "/language:${{matrix.language}}"
